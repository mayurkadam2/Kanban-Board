<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanBan board</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <main class="flex-vertical">
        <nav class="flex">
            <div class="left">
                <a href="#"> <img src="./assets/kanban-board Logo transparent.png" alt="Kanban-Board"></a>

            </div>
            <div class="right">
                <button class="toggle-modal"><i class="fa-solid fa-plus"></i> Add New Task</button>
            </div>
        </nav>
        <div class="progress-rail" id="progress-rail">
            <div class="fill" id="fill"></div>
        </div>
        <section class="board flex">
            <div id="todo" class="task-column  flex-vertical">
                <div class="heading flex">
                    <div class="left">TODO</div>
                    <div class="right">count</div>
                </div>
                <!-- <div draggable="true" class="task">
                    <h2>Start Using Kanban</h2>
                    <p>Use add new task button to create tasks</p>
                    <button><i class="fa-solid fa-trash"></i> Delete</button>
                </div> -->

            </div>
            <div id="progress" class="task-column flex-vertical">
                <div class="heading flex">
                    <div class="left">IN Progress</div>
                    <div class="right">count</div>
                </div>
            </div>
            <div id="done" class="task-column flex-vertical">
                <div class="heading flex">
                    <div class="left">Done</div>
                    <div class="right">count</div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal add-new-task flex-vertical">
        <div class="bg">

        </div>
        <div class="center">
            <div id="close-modal" class="close toggle-modal">
                <button id="close-button"><i class="fa-regular fa-circle-xmark"></i></button>

            </div>
            <input id="task-title-input" type="text" placeholder="Task Title">

            <textarea id="task-desc-input" name="" id="" placeholder="Task Description"></textarea>

            <button id="add-new-task" class="add-task-btn" type="submit">Add Task</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
